  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #f4f4f2;
      --text:  #0c0c0c;
      --sec:   #5a5a5a;
      --dim:   #aaa;
      --faint: #e2e2e0;
      --green: #009e64;
      --red:   #e03030;
      --font:  'Space Grotesk', -apple-system, sans-serif;
      --accent:  #0c0c0c;
      --r-sm:    8px;
      --r-md:    14px;
      --r-lg:    22px;
      --card-bg: #ffffff;
      --card-bd: 1px solid var(--faint);
      --card-sh: none;
      --scene:   none;
    }
    html, body { width:100%; height:100%; background:var(--bg); font-family:var(--font); -webkit-font-smoothing:antialiased; overflow:hidden; }
    #root { width:100%; height:100vh; }
    input, button { font-family:var(--font); }
    ::-webkit-scrollbar { display:none; }
    @keyframes prog    { from { width:0 } to { width:100% } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    @keyframes spin    { to { transform:rotate(360deg) } }
    @keyframes pulseDot{ 0%{transform:scale(1);opacity:1} 70%{transform:scale(2.6);opacity:0} 100%{opacity:0} }
    @keyframes pulseLive{ 0%,100%{opacity:1} 50%{opacity:.2} }
    @keyframes glowPulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(0,158,100,0) } 50%{ box-shadow:0 0 18px 1px rgba(0,158,100,0.16) } }
    @keyframes panelIn { from { opacity:0; transform:translateY(30px) scale(.955) } to { opacity:1; transform:translateY(0) scale(1) } }
    @keyframes sweepX  { from { transform:translateX(-120%) } to { transform:translateX(340%) } }
  </style>
  <!-- Per-render color grade: a fresh but cohesive LIGHT theme each recording,
       so every video looks newly designed. Overrides the :root vars above via
       inline styles on <html> (higher precedence). Honors an injected
       window.__theme (record.js / post pipeline) for reproducibility; otherwise
       generates a random light palette + font from a single hue seed. -->
  <script>
  (function () {
    var FONTS = ["'Space Grotesk'", "'Inter'", "'Manrope'", "'Sora'",
                 "'Plus Jakarta Sans'", "'Outfit'"];
    function hsl(h, s, l, a) { h=(h%360+360)%360; return a==null ? 'hsl(' + h.toFixed(1) + ',' + s.toFixed(1) + '%,' + l.toFixed(1) + '%)' : 'hsla(' + h.toFixed(1) + ',' + s.toFixed(1) + '%,' + l.toFixed(1) + '%,' + a + ')'; }
    function r(a, b) { return a + Math.random() * (b - a); }
    function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
    function generate() {
      var hue = r(0, 360);                              // one hue drives the grade

      // Accent: same hue family (sometimes a gentle shift), richer than the greys.
      var aHue = hue + pick([0, 0, 0, 16, -16, 180]);
      var accent = hsl(aHue, r(46, 70), r(38, 50));

      // Roundness profile — one pick drives every panel/card radius.
      var round = pick([
        { sm: 4,  md: 7,  lg: 11 },   // sharp / editorial
        { sm: 8,  md: 13, lg: 18 },   // soft
        { sm: 12, md: 18, lg: 26 },   // rounded
        { sm: 14, md: 22, lg: 32 }    // pill-ish
      ]);

      // Surface / card treatment — kept light in every variant.
      var surf = pick([
        { bg: '#ffffff',                          bd: '1px solid '   + hsl(hue, r(10, 20), r(86, 90)), sh: 'none' },                       // crisp white
        { bg: hsl(hue, r(16, 28), r(96, 98)),     bd: '1px solid transparent',                         sh: 'none' },                       // tinted fill
        { bg: 'transparent',                      bd: '1.5px solid ' + hsl(hue, r(12, 22), r(83, 88)), sh: 'none' },                       // outline only
        { bg: '#ffffff',                          bd: '1px solid transparent',                         sh: '0 8px 26px -12px ' + hsl(hue, 30, 38, 0.20) } // soft shadow
      ]);

      // Scene background painted behind the slides (always near-white).
      var scene = pick([
        'none',
        'none',
        'linear-gradient(180deg,' + hsl(hue, r(16, 26), r(97.5, 99)) + ' 0%,' + hsl(hue, r(8, 16), r(93.5, 96)) + ' 100%)',
        'radial-gradient(' + hsl(hue, 16, 78, 0.55) + ' 1px, transparent 1px)'  // dot grid (22px tile set inline)
      ]);

      return {
        '--bg':    hsl(hue, r(8, 24),  r(95, 97.5)),    // near-white tinted paper
        '--text':  hsl(hue, r(10, 22), r(9, 14)),       // near-black tinted ink
        '--sec':   hsl(hue, r(12, 18), r(34, 42)),
        '--dim':   hsl(hue, r(10, 16), r(60, 68)),
        '--faint': hsl(hue, r(10, 20), r(86, 90)),
        '--green': hsl(r(148, 170),     r(58, 74), r(32, 40)),  // profit: shade varies, meaning fixed
        '--red':   hsl(r(350, 368) % 360, r(64, 80), r(47, 55)), // loss
        '--font':  pick(FONTS) + ", -apple-system, sans-serif",
        '--accent':  accent,
        '--r-sm':    round.sm + 'px',
        '--r-md':    round.md + 'px',
        '--r-lg':    round.lg + 'px',
        '--card-bg': surf.bg,
        '--card-bd': surf.bd,
        '--card-sh': surf.sh,
        '--scene':   scene
      };
    }
    var t = (window.__theme && typeof window.__theme === 'object') ? window.__theme : generate();
    var root = document.documentElement;
    for (var k in t) { if (k.charAt(0) === '-') root.style.setProperty(k, t[k]); }
    window.__themeApplied = t;
  })();
  </script>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── API ──────────────────────────────────────────────────────────────────
   All data from Polymarket's own public, CORS-enabled APIs — no token.     */
const GAMMA = 'https://gamma-api.polymarket.com';
const DATA  = 'https://data-api.polymarket.com';
const CLOB  = 'https://clob.polymarket.com';

function parseSlug(raw) {
  const s = raw.trim();
  const m = s.match(/polymarket\.com\/event\/([a-z0-9-]+)/i);
  if (m) return m[1].toLowerCase();
  if (/^[a-z0-9-]+$/i.test(s) && s.includes('-')) return s.toLowerCase();
  return null;
}
function safeJson(v, fb) { try { return typeof v==='string' ? JSON.parse(v) : (v ?? fb); } catch(_) { return fb; } }
async function apiFetch(url) {
  const r = await fetch(url, { headers:{ Accept:'application/json' } });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadEvent(slug) {
  const evs = await apiFetch(`${GAMMA}/events?slug=${slug}`);
  if (!Array.isArray(evs) || !evs.length) throw new Error('Event not found — check the link');
  const ev = evs[0];
  const markets = (ev.markets || []).filter(m => m.outcomes).map(m => {
    const prices = safeJson(m.outcomePrices, []).map(Number);
    return { ...m,
      _outcomes: safeJson(m.outcomes, []),
      _prices:   prices,
      _tokens:   safeJson(m.clobTokenIds, []),
      _yes:      isFinite(prices[0]) ? prices[0] : 0 };
  });
  if (!markets.length) throw new Error('This event has no tradable markets');

  const primary = [...markets].sort((a,b) => b._yes - a._yes)[0];
  const isMulti = markets.length > 1;
  const raceMarkets = isMulti
    ? [...markets].sort((a,b) => b._yes - a._yes).slice(0, 5)
    : [];

  const [holders, hist, trades, ...raceHists] = await Promise.allSettled([
    apiFetch(`${DATA}/holders?market=${primary.conditionId}&limit=20`),
    primary._tokens[0]
      ? apiFetch(`${CLOB}/prices-history?market=${primary._tokens[0]}&interval=all&fidelity=360`)
      : Promise.resolve(null),
    apiFetch(`${DATA}/trades?market=${primary.conditionId}&limit=140&takerOnly=false`),
    ...raceMarkets.map(m => m._tokens[0]
      ? apiFetch(`${CLOB}/prices-history?market=${m._tokens[0]}&interval=all&fidelity=720`)
      : Promise.resolve(null)),
  ]);
  const ok = (r,fb) => r.status==='fulfilled' && r.value!=null ? r.value : fb;
  return { event:ev, markets, primary,
           holders: ok(holders,[]),
           history: ok(hist,{history:[]}).history || [],
           trades:  ok(trades,[]),
           raceHists: raceMarkets.map((m,i)=>({ m, hist: ok(raceHists[i],{history:[]}).history || [] })) };
}

/* ── COMPUTE ──────────────────────────────────────────────────────────── */
function cleanName(name, pseudo, wallet) {
  const w = wallet || '';
  const short = w ? `${w.slice(0,6)}…${w.slice(-4)}` : '—';
  if (!name || /^0x[a-f0-9]/i.test(name) || name.length > 22) return pseudo || short;
  return name;
}

function computeEvent({ event, markets, primary, holders, history, trades, raceHists }) {
  const num = v => { const n = parseFloat(v); return isFinite(n) ? n : 0; };

  const isMulti  = markets.length > 1;
  const yes      = primary._yes;
  const resolved = primary.umaResolutionStatus === 'resolved' || primary.closed;
  const resYes   = (primary._prices[0]||0) >= 0.5;

  const cleanQ = q => (q||'').replace(/^Will\s+/i,'').replace(/\?$/,'').trim();
  const leadName = isMulti
    ? (primary.groupItemTitle && !/^\d/.test(primary.groupItemTitle)
        ? primary.groupItemTitle : cleanQ(primary.question))
    : 'YES';

  const hpts = (history||[]).filter(p => isFinite(p.p));
  const open = hpts.length ? hpts[0].p : yes;
  const now  = hpts.length ? hpts[hpts.length-1].p : yes;
  let high = open, low = open;
  hpts.forEach(p => { if (p.p>high) high=p.p; if (p.p<low) low=p.p; });

  const flat = [];
  (holders||[]).forEach(g => (g.holders||[]).forEach(h => flat.push(h)));
  const mapH = (h) => ({
    name:   cleanName(h.name, h.pseudonym, h.proxyWallet),
    wallet: h.proxyWallet || '',
    verified: !!h.verified,
    shares: num(h.amount),
    value:  num(h.amount) * (h.outcomeIndex===0 ? yes : (1-yes)),
  });
  const yesHolders = flat.filter(h => h.outcomeIndex===0).map(mapH).sort((a,b)=>b.shares-a.shares);
  const noHolders  = flat.filter(h => h.outcomeIndex===1).map(mapH).sort((a,b)=>b.shares-a.shares);
  const topHolderValue = Math.max(0, ...yesHolders.map(h=>h.value), ...noHolders.map(h=>h.value));

  const fieldName = m => (m.groupItemTitle && !/^\d/.test(m.groupItemTitle)) ? m.groupItemTitle : cleanQ(m.question);

  /* full leaderboard (all outcomes for multi-events) */
  const fieldFull = [...markets].sort((a,b)=>b._yes-a._yes).map(m => ({
    name:    fieldName(m),
    yes:     m._yes,
    chg24h:  num(m.oneDayPriceChange),
    chg7d:   num(m.oneWeekPriceChange),
  }));
  const field = fieldFull.slice(0,8);

  /* races: top-5 outcomes with their full price histories, for overlay chart
     and race-aware Monte Carlo */
  const RACE_PALETTE = ['#009e64','#e03030','#0b6bcb','#d97706','#7c3aed'];
  const races = (raceHists||[]).map((r,i)=>{
    const h = (r.hist||[]).filter(p=>isFinite(p.p)).map(p=>({t:p.t,p:p.p}));
    return {
      name:    fieldName(r.m),
      color:   RACE_PALETTE[i % RACE_PALETTE.length],
      yes:     r.m._yes,
      chg24h:  num(r.m.oneDayPriceChange),
      chg7d:   num(r.m.oneWeekPriceChange),
      hist:    h,
    };
  }).filter(r=>r.hist.length>1 || r.yes>0);

  const tr = (Array.isArray(trades)?trades:[]).map(t => ({
    ts: t.timestamp,
    trader: cleanName(t.name, t.pseudonym, t.proxyWallet),
    side: t.side, outcome: t.outcome,
    shares: num(t.size), price: num(t.price),
    value: num(t.size) * num(t.price),
  })).sort((a,b)=>b.value-a.value).slice(0,32);

  const endTs   = new Date(primary.endDate || event.endDate || 0).getTime() || 0;
  const daysLeft= endTs ? Math.ceil((endTs - Date.now())/86400000) : 0;

  return {
    title: event.title, slug: event.slug,
    image: event.icon || event.image || '',
    question: primary.question,
    isMulti, marketCount: markets.length,
    leadName, yes, no:1-yes, resolved, resYes,
    payYes: yes>0.0001       ? 1/yes       : 0,
    payNo:  (1-yes)>0.0001   ? 1/(1-yes)   : 0,
    volume:      num(event.volume),
    volume24:    num(event.volume24hr),
    volume1wk:   num(event.volume1wk),
    liquidity:   num(event.liquidity),
    openInterest:num(event.openInterest),
    comments:    num(event.commentCount),
    competitive: num(event.competitive),
    endTs, daysLeft,
    history: hpts, open, high, low, now,
    chg1d: num(primary.oneDayPriceChange),
    chg1w: num(primary.oneWeekPriceChange),
    chg1m: num(primary.oneMonthPriceChange),
    field, fieldFull, races, yesHolders, noHolders, topHolderValue, trades:tr,
  };
}

function bullBear(E) {
  const ai=(typeof window!=='undefined')&&window.__aiCopy;
  if (ai && Array.isArray(ai.strengths) && ai.strengths.length)
    return { bull: ai.strengths.slice(0,4), bear: (ai.risks||[]).slice(0,4) };
  const bull=[], bear=[], pp=x=>(Math.abs(x)*100).toFixed(1);
  const y=E.yes;
  /* multi-event extras */
  if (E.isMulti && E.fieldFull && E.fieldFull.length>=2) {
    const f=E.fieldFull, gap=f[0].yes-f[1].yes;
    bull.push(`${f.length} contenders in the race — "${f[0].name}" leads at ${(f[0].yes*100).toFixed(1)}%`);
    if (gap<0.06) bear.push(`Tight at the top — only ${(gap*100).toFixed(1)} points between #1 and #2`);
    else if (gap>0.3) bull.push(`Decisive ${(gap*100).toFixed(1)}-point lead over the runner-up`);
    const mover=[...f].sort((a,b)=>Math.abs(b.chg24h)-Math.abs(a.chg24h))[0];
    if (mover && Math.abs(mover.chg24h)>=0.04) {
      (mover.chg24h>0?bull:bear).push(`"${mover.name}" moved ${pp(mover.chg24h)} points in the last 24h`);
    }
  }
  if (y>=0.62)      bull.push(`Market prices the leading outcome at ${(y*100).toFixed(1)}% — a clear favorite`);
  else if (y<=0.38) bear.push(`Leading outcome sits at just ${(y*100).toFixed(1)}% — the market is sceptical`);
  else              bull.push(`Near coin-flip at ${(y*100).toFixed(1)}% — the outcome is genuinely contested`);
  if (E.chg1w> 0.015) bull.push(`Up ${pp(E.chg1w)} points over the past 7 days — momentum building`);
  if (E.chg1w<-0.015) bear.push(`Down ${pp(E.chg1w)} points over the past 7 days — sentiment fading`);
  if (E.chg1d> 0.025) bull.push(`Sharp ${pp(E.chg1d)}-point jump in the last 24 hours`);
  if (E.chg1d<-0.025) bear.push(`Dropped ${pp(E.chg1d)} points in the last 24 hours`);
  if (E.volume>5e6)   bull.push(`Heavy conviction — $${fmt(E.volume)} traded on this event`);
  if (E.liquidity>0 && E.liquidity<25000) bear.push(`Thin liquidity ($${fmt(E.liquidity)}) — odds can swing on small flow`);
  const range=E.high-E.low;
  if (range>0.4)      bear.push(`Wide ${(range*100).toFixed(0)}-point range — historically volatile`);
  if (E.topHolderValue>15000) bull.push(`Whale presence — largest single position worth $${fmt(E.topHolderValue)}`);
  if (!bull.length) bull.push('Limited bullish signals in the current data');
  if (!bear.length) bear.push('No major risk flags detected');
  return { bull:bull.slice(0,4), bear:bear.slice(0,4) };
}
function signal(E) {
  if (E.resolved) return { label:E.resYes?'Resolved · YES':'Resolved · NO', color:E.resYes?'var(--green)':'var(--red)' };
  const y=E.yes;
  if (y>=0.85) return { label:'Strong Conviction', color:'var(--green)' };
  if (y>=0.62) return { label:'Leaning Yes',       color:'var(--green)' };
  if (y> 0.38) return { label:'Coin Flip',         color:'var(--text)'  };
  if (y> 0.15) return { label:'Leaning No',        color:'var(--red)'   };
  return           { label:'Heavily Doubted',  color:'var(--red)'   };
}

function fmt(n){ const a=Math.abs(n); if(a>=1e9)return(n/1e9).toFixed(2)+'B'; if(a>=1e6)return(n/1e6).toFixed(2)+'M'; if(a>=1e3)return(n/1e3).toFixed(1)+'k'; return Math.round(n).toString(); }
function pct(x,d=1){ return (x*100).toFixed(d)+'%'; }
function relTime(ts){ const s=Date.now()/1000-(ts||0);
  if(s<90)    return 'just now';
  if(s<3600)  return Math.round(s/60)+'m ago';
  if(s<86400) return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago'; }

/* ── MONTE CARLO ──────────────────────────────────────────────────────────
   Treats the market probability as a logit-space random walk with no drift
   (a martingale — consistent with an efficient market), calibrates the step
   volatility from the event's own price history, and rolls many forward
   simulations out to resolution.                                          */
function logit(p){ const c=Math.min(0.999,Math.max(0.001,p)); return Math.log(c/(1-c)); }
function sigmoid(x){ return 1/(1+Math.exp(-x)); }
function randn(){
  let u=0,v=0;
  while(u===0) u=Math.random();
  while(v===0) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function monteCarlo(E){
  const N=360, STEPS=48;
  const p0=(E.now>0&&E.now<1)?E.now:Math.min(0.999,Math.max(0.001,E.yes));
  const h=E.history||[];

  /* per-sample volatility of logit returns, from the market's own history */
  let sig=0.18;
  if(h.length>=3){
    const d=[];
    for(let i=1;i<h.length;i++){
      const a=logit(h[i-1].p), b=logit(h[i].p);
      if(isFinite(a)&&isFinite(b)) d.push(b-a);
    }
    if(d.length>1){
      const mean=d.reduce((s,x)=>s+x,0)/d.length;
      const vv=d.reduce((s,x)=>s+(x-mean)*(x-mean),0)/d.length;
      sig=Math.sqrt(vv)||0.18;
    }
  }
  /* scale that one-sample volatility up to the time still left */
  const m=h.length;
  const spanD=(m>=2 && h[m-1].t && h[0].t) ? Math.max(1,(h[m-1].t-h[0].t)/86400) : 30;
  const intervalD=m>=2 ? spanD/(m-1) : 1;
  const daysLeft=Math.max(1,E.daysLeft||1);
  const terminalSig=Math.min(6, sig*Math.sqrt(daysLeft/Math.max(0.05,intervalD)));
  const stepSig=terminalSig/Math.sqrt(STEPS);

  const x0=logit(p0), paths=[];
  for(let n=0;n<N;n++){
    let x=x0; const path=[p0];
    for(let s=0;s<STEPS;s++){ x+=stepSig*randn(); path.push(sigmoid(x)); }
    paths.push(path);
  }
  /* per-step 5/50/95 percentile band */
  const lo=[],md=[],hi=[];
  for(let s=0;s<=STEPS;s++){
    const col=paths.map(p=>p[s]).sort((a,b)=>a-b);
    const q=f=>col[Math.min(N-1,Math.round(f*(N-1)))];
    lo.push(q(0.05)); md.push(q(0.5)); hi.push(q(0.95));
  }
  const finals=paths.map(p=>p[STEPS]).sort((a,b)=>a-b);
  const qf=f=>finals[Math.min(N-1,Math.round(f*(N-1)))];
  return { N, STEPS, p0, daysLeft, paths, lo, md, hi,
    pLow:qf(0.05), pHigh:qf(0.95),
    above: finals.filter(v=>v>=0.5).length/N };
}

/* ── NUMERICAL-METHOD HELPERS ─────────────────────────────────────────── */
function mean(a){ return a.length ? a.reduce((s,x)=>s+x,0)/a.length : 0; }
function stdev(a){ const m=mean(a); return a.length ? Math.sqrt(a.reduce((s,x)=>s+(x-m)*(x-m),0)/a.length) : 0; }
function lgamma(x){
  const c=[0.99999999999980993,676.5203681218851,-1259.1392167224028,
           771.32342877765313,-176.61502916214059,12.507343278686905,
           -0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  if(x<0.5) return Math.log(Math.PI/Math.sin(Math.PI*x))-lgamma(1-x);
  x-=1; let a=c[0]; const t=x+7.5;
  for(let i=1;i<9;i++) a+=c[i]/(x+i);
  return 0.5*Math.log(2*Math.PI)+(x+0.5)*Math.log(t)-t+Math.log(a);
}
function betaPDF(x,a,b){
  if(x<=0||x>=1) return 0;
  return Math.exp((a-1)*Math.log(x)+(b-1)*Math.log(1-x)+lgamma(a+b)-lgamma(a)-lgamma(b));
}
function normPDF(x,mu,s){ s=s||1e-6; const z=(x-mu)/s; return Math.exp(-0.5*z*z)/(s*Math.sqrt(2*Math.PI)); }
function erf(x){

  const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);
  return s*y;
}
function normCDF(z){ return 0.5*(1+erf(z/Math.SQRT2)); }
function invNorm(u){
  u=Math.min(1-1e-9,Math.max(1e-9,u));
  const a=[-3.969683028665376e1,2.209460984245205e2,-2.759285104469687e2,1.383577518672690e2,-3.066479806614716e1,2.506628277459239],
        b=[-5.447609879822406e1,1.615858368580409e2,-1.556989798598866e2,6.680131188771972e1,-1.328068155288572e1],
        c=[-7.784894002430293e-3,-3.223964580411365e-1,-2.400758277161838,-2.549732539343734,4.374664141464968,2.938163982698783],
        d=[7.784695709041462e-3,3.224671290700398e-1,2.445134137142996,3.754408661907416];
  const pl=0.02425; let q,r;
  if(u<pl){ q=Math.sqrt(-2*Math.log(u)); return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1); }
  if(u<=1-pl){ q=u-0.5; r=q*q; return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1); }
  q=Math.sqrt(-2*Math.log(1-u)); return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}
function halton(i,base){ let f=1,r=0,n=i; while(n>0){ f/=base; r+=f*(n%base); n=Math.floor(n/base); } return r; }
function histogram(data,bins,lo,hi){
  const h=new Array(bins).fill(0), w=(hi-lo)/bins||1;
  data.forEach(v=>{ let k=Math.floor((v-lo)/w); if(k<0)k=0; if(k>=bins)k=bins-1; h[k]++; });
  return { h, w, lo, hi };
}

function useReveal(){
  const [r,setR]=useState(false);
  useEffect(()=>{ const id=requestAnimationFrame(()=>setR(true)); return ()=>cancelAnimationFrame(id); },[]);
  return r;
}
/* a counter that ticks every `period` ms — drives perpetual live re-computes */
function useLiveTick(period){
  const [t,setT]=useState(0);
  useEffect(()=>{ const id=setInterval(()=>setT(x=>x+1),period); return ()=>clearInterval(id); },[period]);
  return t;
}
function AnimNum({ to, prefix='', suffix='', dec=0, dur=1300, size=64, color, compact=false, signed=false, live=true }) {
  const [v,setV]=useState(0);
  const vRef=useRef(0); const raf=useRef(); const t0=useRef(0); const from=useRef(0);
  useEffect(()=>{
    const set=x=>{ vRef.current=x; setV(x); };
    from.current=vRef.current;          /* glide from where we are, not from 0 */
    t0.current=Date.now();
    const span=to-from.current;
    const amp=Math.max(Math.abs(to)*0.0045, dec>0?Math.pow(10,-dec)*0.55:0);
    let target=to, lastHop=Date.now();
    const frame=()=>{
      const now=Date.now();
      const p=Math.min((now-t0.current)/dur,1), e=1-Math.pow(1-p,3);
      if(p<1){ set(from.current+span*e); }
      else if(live && amp>0){
        /* continuous rAF-smoothed wobble — every frame eases toward a target
           that re-rolls ~3×/sec; reads as a smooth real-time feed, never snaps */
        if(now-lastHop>340){ target=to+(Math.random()-0.5)*2*amp; lastHop=now; }
        set(vRef.current+(target-vRef.current)*0.16);
      } else { set(to); return; }
      raf.current=requestAnimationFrame(frame);
    };
    raf.current=requestAnimationFrame(frame);
    return ()=>cancelAnimationFrame(raf.current);
  },[to,dur,live,dec]);
  const col=color||(to>=0?'var(--green)':'var(--red)');
  const abs=Math.abs(v);
  const body=compact ? fmt(abs) : abs.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
  const sign=to<0 ? '−' : (signed ? '+' : '');
  return <span style={{color:col,fontSize:size,fontWeight:700,letterSpacing:'-0.04em',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>
    {prefix}{sign}{body}{suffix}
  </span>;
}
const SC = {width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:'56px 80px'};

/* probability-vs-time chart, drawn + animated as an SVG path */
function ProbChart({ history, up }) {
  const W=1000, H=300, pad=16;
  /* live data feed — keep appending fresh ticks so the trend visibly grows */
  const [live,setLive]=useState([]);
  useEffect(()=>{
    setLive([]);
    const h=history||[];
    let last=h.length?h[h.length-1].p:0.5;
    let tt=h.length?h[h.length-1].t:Math.floor(Date.now()/1000);
    const id=setInterval(()=>{
      last=Math.min(0.985,Math.max(0.015,last+(Math.random()-0.5)*0.015));
      tt+=3600;
      setLive(L=>[...L,{t:tt,p:last}].slice(-64));
    },320);
    return ()=>clearInterval(id);
  },[history]);
  const fullHist=useMemo(()=>(history||[]).concat(live),[history,live]);
  const pts = useMemo(()=>{
    const a=fullHist;
    if(a.length<=160) return a;
    const step=a.length/160, out=[];
    for(let i=0;i<160;i++) out.push(a[Math.floor(i*step)]);
    out.push(a[a.length-1]);
    return out;
  },[fullHist]);
  const lineRef=useRef(), areaRef=useRef(), drawn=useRef(false);
  const g = useMemo(()=>{
    const n=pts.length;
    if(n<2) return {n};
    let lo=Math.min(...pts.map(p=>p.p)), hi=Math.max(...pts.map(p=>p.p));
    let hiI=0, loI=0;
    pts.forEach((p,i)=>{ if(p.p>pts[hiI].p)hiI=i; if(p.p<pts[loI].p)loI=i; });
    const r=(hi-lo)||0.1; lo=Math.max(0,lo-r*0.18); hi=Math.min(1,hi+r*0.18);
    const xs=i=>pad+(i/(n-1))*(W-2*pad);
    const ys=p=>pad+(1-(p-lo)/(hi-lo))*(H-2*pad);
    const d=pts.map((p,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(p.p).toFixed(1)).join(' ');
    const area=d+` L${xs(n-1).toFixed(1)} ${(H-pad).toFixed(1)} L${xs(0).toFixed(1)} ${(H-pad).toFixed(1)} Z`;
    const win=Math.max(2,Math.round(n/14));
    const ma=pts.map((_,i)=>{ const s=Math.max(0,i-win+1); let sum=0; for(let j=s;j<=i;j++)sum+=pts[j].p; return sum/(i-s+1); });
    const maPath=ma.map((m,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(m).toFixed(1)).join(' ');
    return { n,d,area,maPath,lo,hi,
      grid:[0.25,0.5,0.75].map(f=>({ y:pad+(1-f)*(H-2*pad), v:lo+(hi-lo)*f })),
      hiPt:{x:xs(hiI),y:ys(pts[hiI].p),v:pts[hiI].p},
      loPt:{x:xs(loI),y:ys(pts[loI].p),v:pts[loI].p},
      end:{x:xs(n-1),y:ys(pts[n-1].p)} };
  },[pts]);

  useEffect(()=>{
    const p=lineRef.current; if(!p||g.n<2||drawn.current) return;
    drawn.current=true;
    const len=p.getTotalLength();
    p.style.transition='none'; p.style.strokeDasharray=len; p.style.strokeDashoffset=len;
    p.getBoundingClientRect();
    requestAnimationFrame(()=>{ p.style.transition='stroke-dashoffset 1.7s cubic-bezier(.33,1,.68,1)'; p.style.strokeDashoffset=0; });
    setTimeout(()=>{ if(lineRef.current) lineRef.current.style.strokeDasharray='none'; },1800);
    const ar=areaRef.current;
    if(ar){ ar.style.transition='none'; ar.style.opacity=0; ar.getBoundingClientRect();
      requestAnimationFrame(()=>{ ar.style.transition='opacity 1.5s ease .3s'; ar.style.opacity=1; }); }
  },[g.d,g.n]);

  if(g.n<2) return <div style={{height:140,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dim)',fontSize:13}}>Not enough price history</div>;
  const col=up?'var(--green)':'var(--red)';
  const gid='cg'+(up?'u':'d');
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'100%',display:'block',overflow:'visible'}}>
    <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stopColor={col} stopOpacity="0.20"/>
      <stop offset="100%" stopColor={col} stopOpacity="0"/>
    </linearGradient></defs>
    {g.grid.map((ln,i)=>(
      <g key={i}>
        <line x1={pad} y1={ln.y} x2={W-pad} y2={ln.y} stroke="var(--faint)" strokeWidth="1"/>
        <text x={W-pad} y={ln.y-5} textAnchor="end" fontSize="15" fill="var(--dim)" fontFamily="var(--font)">{(ln.v*100).toFixed(0)}%</text>
      </g>
    ))}
    <path ref={areaRef} d={g.area} fill={`url(#${gid})`}/>
    <path d={g.maPath} fill="none" stroke="var(--dim)" strokeWidth="1.6" strokeDasharray="5 5" opacity="0.7"/>
    <path ref={lineRef} d={g.d} fill="none" stroke={col} strokeWidth="3.4" strokeLinejoin="round" strokeLinecap="round"/>
    <circle cx={g.hiPt.x} cy={g.hiPt.y} r="4" fill="var(--text)"/>
    <text x={g.hiPt.x} y={g.hiPt.y-12} textAnchor="middle" fontSize="16" fontWeight="700" fill="var(--text)" fontFamily="var(--font)">High {(g.hiPt.v*100).toFixed(0)}%</text>
    <circle cx={g.loPt.x} cy={g.loPt.y} r="4" fill="var(--text)"/>
    <text x={g.loPt.x} y={g.loPt.y+22} textAnchor="middle" fontSize="16" fontWeight="700" fill="var(--text)" fontFamily="var(--font)">Low {(g.loPt.v*100).toFixed(0)}%</text>
    <circle cx={g.end.x} cy={g.end.y} r="9" fill={col} opacity="0.25" style={{transformBox:'fill-box',transformOrigin:'center',animation:'pulseDot 1.8s ease-out infinite'}}/>
    <circle cx={g.end.x} cy={g.end.y} r="5" fill={col}/>
  </svg>;
}

/* semicircular sentiment gauge with an animated, settling needle */
function Gauge({ p, color }) {
  const cx=180, cy=180, r=140;
  const reveal=useReveal();
  const arcRef=useRef();
  const cl=Math.max(0,Math.min(1,p));
  const [wob,setWob]=useState(0);
  useEffect(()=>{ const id=setInterval(()=>setWob((Math.random()-0.5)*0.07),420); return ()=>clearInterval(id); },[]);
  const shown=Math.max(0,Math.min(1,cl+(reveal?wob:0)));
  const theta=(180-cl*180)*Math.PI/180;
  const ex=cx+r*Math.cos(theta), ey=cy-r*Math.sin(theta);
  const valArc=`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${ex.toFixed(2)} ${ey.toFixed(2)}`;
  useEffect(()=>{
    const el=arcRef.current; if(!el) return;
    let len; try{ len=el.getTotalLength(); }catch(_){ return; }
    el.style.transition='none'; el.style.strokeDasharray=len; el.style.strokeDashoffset=len;
    el.getBoundingClientRect();
    requestAnimationFrame(()=>{ el.style.transition='stroke-dashoffset 1.6s cubic-bezier(.33,1,.68,1)'; el.style.strokeDashoffset=0; });
  },[valArc]);
  return <svg viewBox="0 0 360 200" style={{width:'100%',height:'auto',display:'block',margin:'0 auto'}}>
    <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke="var(--faint)" strokeWidth="24" strokeLinecap="round"/>
    <path ref={arcRef} d={valArc} fill="none" stroke={color} strokeWidth="24" strokeLinecap="round"/>
    {[0,0.25,0.5,0.75,1].map((t,i)=>{
      const a=(180-t*180)*Math.PI/180;
      const x1=cx+(r-25)*Math.cos(a), y1=cy-(r-25)*Math.sin(a);
      const x2=cx+(r+7)*Math.cos(a),  y2=cy-(r+7)*Math.sin(a);
      return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--dim)" strokeWidth={t===0.5?3:2}/>;
    })}
    <g style={{transformOrigin:`${cx}px ${cy}px`,transform:`rotate(${reveal?(shown-0.5)*180:-90}deg)`,transition:'transform 1s cubic-bezier(.34,1.15,.64,1)'}}>
      <path d={`M ${cx-8} ${cy} L ${cx} ${cy-r+34} L ${cx+8} ${cy} Z`} fill="var(--text)"/>
    </g>
    <circle cx={cx} cy={cy} r="15" fill="var(--text)"/>
    <circle cx={cx} cy={cy} r="6" fill="#fff"/>
  </svg>;
}

function PMonteCarlo({E}) {
  const reveal=useReveal();
  const liveT=useLiveTick(360);
  const mc=useMemo(()=>monteCarlo(E),[E,liveT]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const lead=E.isMulti?E.leadName:'YES';
  const W=1000, H=330, pad=16;
  const xs=s=>pad+(s/mc.STEPS)*(W-2*pad);
  const ys=p=>pad+(1-p)*(H-2*pad);
  const line=arr=>arr.map((p,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(p).toFixed(1)).join(' ');

  /* a thinned spray of individual simulated paths */
  const spray=[];
  const stepN=Math.max(1,Math.floor(mc.paths.length/130));
  for(let i=0;i<mc.paths.length;i+=stepN) spray.push(mc.paths[i]);

  const hiPts=mc.hi.map((p,i)=>`${xs(i).toFixed(1)} ${ys(p).toFixed(1)}`);
  const loPts=mc.lo.map((p,i)=>`${xs(i).toFixed(1)} ${ys(p).toFixed(1)}`);
  const band='M'+hiPts.join(' L')+' L'+loPts.slice().reverse().join(' L')+' Z';

  return <Panel label={`Monte Carlo · ${mc.N} simulations`}>
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'baseline',gap:11,marginBottom:6}}>

        </span>

          {[0.25,0.5,0.75].map((f,i)=>(

            </g>

          <g style={{opacity:reveal?1:0,transition:'opacity 1.2s ease'}}>

            ))}

            style={{opacity:reveal?1:0,transition:'opacity 1s ease .3s'}}/>

      </div>
    </div>
  </Panel>;
}

/* Метод Гаусса — fit a normal curve to the simulated outcome distribution */
function PGauss({E}) {
  const reveal=useReveal();
  const liveT=useLiveTick(700);
  const mc=useMemo(()=>monteCarlo(E),[E,liveT]);
  const d=useMemo(()=>{
    const finals=mc.paths.map(p=>p[mc.STEPS]);
    const mu=mean(finals), sg=stdev(finals)||0.01;
    const lo=Math.max(0,mu-3.4*sg), hi=Math.min(1,mu+3.4*sg);
    const bins=20, H=histogram(finals,bins,lo,hi);
    return { mu, sg, lo, hi, bins, h:H.h, peak:Math.max(...H.h,1) };
  },[mc]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const W=1000,VH=290,pad=16;
  const xs=v=>pad+((v-d.lo)/(d.hi-d.lo||1))*(W-2*pad);
  const pp=normPDF(d.mu,d.mu,d.sg)||1;
  const yc=v=>VH-pad-(normPDF(v,d.mu,d.sg)/pp)*(VH-2*pad)*0.95;
  const curve=[]; for(let i=0;i<=90;i++){ const v=d.lo+(d.hi-d.lo)*i/90; curve.push((i?'L':'M')+xs(v).toFixed(1)+' '+yc(v).toFixed(1)); }
  return <Panel label="Gaussian Fit · Method of Gauss">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',gap:22,marginBottom:6}}>
        <div><div style={lblS}>Mean μ</div><AnimNum to={d.mu*100} suffix="%" dec={1} size={25} color="var(--text)"/></div>
        <div><div style={lblS}>Std σ</div><AnimNum to={d.sg*100} suffix="%" dec={1} size={25} color="var(--text)"/></div>
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',alignItems:'center'}}>
        <svg viewBox={`0 0 ${W} ${VH}`} style={svgS}>
          {d.h.map((c,i)=>{
            const bw=(W-2*pad)/d.bins, bh=(c/d.peak)*(VH-2*pad)*0.9;
            return <rect key={i} x={pad+i*bw+1.5} width={bw-3}
              y={reveal?VH-pad-bh:VH-pad} height={reveal?bh:0} fill={col} opacity="0.22"
              style={{transition:`all .8s cubic-bezier(.33,1,.68,1) ${i*22}ms`}}/>;
          })}
          <path d={curve.join(' ')} fill="none" stroke={col} strokeWidth="3.4"
            style={{opacity:reveal?1:0,transition:'opacity 1s ease .3s'}}/>
          <line x1={xs(d.mu)} y1={pad} x2={xs(d.mu)} y2={VH-pad} stroke={col}
            strokeWidth="1.4" strokeDasharray="5 5" opacity="0.5"/>
        </svg>
      </div>
      <div style={capS}>Normal curve fitted to {mc.N} simulated outcomes</div>
    </div>
  </Panel>;
}

/* Метод моментов — recover a Beta distribution by matching sample moments */
function PMoments({E}) {
  const reveal=useReveal();
  const liveT=useLiveTick(800);
  const mc=useMemo(()=>monteCarlo(E),[E,liveT]);
  const d=useMemo(()=>{
    const finals=mc.paths.map(p=>p[mc.STEPS]);
    let m=Math.min(0.999,Math.max(0.001,mean(finals)));
    const v=Math.max(1e-5,Math.pow(stdev(finals),2));
    const k=m*(1-m)/v-1;
    return { m, a:Math.max(0.25,m*k), b:Math.max(0.25,(1-m)*k) };
  },[mc]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const W=1000,VH=290,pad=16;
  const xs=p=>pad+p*(W-2*pad);
  let peak=0; const raw=[];
  for(let i=0;i<=120;i++){ const x=i/120, y=betaPDF(x,d.a,d.b); raw.push([x,y]); if(y>peak)peak=y; }
  const ys=y=>VH-pad-(y/(peak||1))*(VH-2*pad)*0.95;
  const path=raw.map((p,i)=>(i?'L':'M')+xs(p[0]).toFixed(1)+' '+ys(p[1]).toFixed(1)).join(' ');
  return <Panel label="Method of Moments · Beta Fit">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',gap:22,marginBottom:6}}>
        <div><div style={lblS}>Shape α</div><AnimNum to={d.a} dec={2} size={25} color="var(--text)"/></div>
        <div><div style={lblS}>Shape β</div><AnimNum to={d.b} dec={2} size={25} color="var(--text)"/></div>
        <div><div style={lblS}>Mean</div><AnimNum to={d.a/(d.a+d.b)*100} suffix="%" dec={1} size={25} color="var(--text)"/></div>
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',alignItems:'center'}}>
        <svg viewBox={`0 0 ${W} ${VH}`} style={svgS}>
          <path d={path+` L${xs(1)} ${VH-pad} L${xs(0)} ${VH-pad} Z`} fill={col}
            style={{opacity:reveal?0.14:0,transition:'opacity 1s ease .2s'}}/>
          <path d={path} fill="none" stroke={col} strokeWidth="3.4"
            style={{opacity:reveal?1:0,transition:'opacity 1s ease'}}/>
        </svg>
      </div>
      <div style={capS}>Beta(α, β) matched to the first two sample moments</div>
    </div>
  </Panel>;
}

/* Квазислучайные последовательности — Halton vs pseudo-random convergence */
function PQuasiMC({E}) {
  const reveal=useReveal();
  const liveT=useLiveTick(900);
  const d=useMemo(()=>{
    const mc=monteCarlo(E);
    const x0=logit((E.now>0&&E.now<1)?E.now:E.yes);
    const sig=Math.max(0.05,(logit(mc.hi[mc.STEPS])-logit(mc.lo[mc.STEPS]))/3.29);
    const f=z=>sigmoid(x0+sig*z), M=220;
    const pseudo=[], quasi=[]; let sp=0,sq=0;
    for(let n=1;n<=M;n++){
      sp+=f(randn());
      sq+=f(invNorm(halton(n,2)));
      pseudo.push(sp/n); quasi.push(sq/n);
    }
    return { pseudo, quasi, M, est:quasi[M-1] };
  },[E,liveT]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const W=1000,VH=270,pad=18;
  const all=d.pseudo.concat(d.quasi);
  let lo=Math.min(...all), hi=Math.max(...all); const r=(hi-lo)||0.1; lo-=r*0.25; hi+=r*0.25;
  const xs=i=>pad+(i/(d.M-1))*(W-2*pad);
  const ys=v=>pad+(1-(v-lo)/(hi-lo))*(VH-2*pad);
  const ln=arr=>arr.map((v,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(v).toFixed(1)).join(' ');
  return <Panel label="Quasi-Random Sequences · Halton">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:6}}>
        <AnimNum to={d.est*100} suffix="%" dec={1} size={40} dur={1300} color={col}/>
        <span style={{fontSize:14,color:'var(--sec)'}}>converged estimate · {d.M} samples</span>
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',alignItems:'center'}}>
        <svg viewBox={`0 0 ${W} ${VH}`} style={svgS}>
          <path d={ln(d.pseudo)} fill="none" stroke="var(--dim)" strokeWidth="2"
            strokeDasharray="4 4" style={{opacity:reveal?0.85:0,transition:'opacity 1s ease'}}/>
          <path d={ln(d.quasi)} fill="none" stroke={col} strokeWidth="3.2"
            style={{opacity:reveal?1:0,transition:'opacity 1s ease .2s'}}/>
        </svg>
      </div>
      <div style={capS}>
        <span style={{color:col,fontWeight:700}}>━ Halton</span> converges faster than
        <span style={{fontWeight:700}}> ┄ pseudo-random</span>
      </div>
    </div>
  </Panel>;
}

/* Latin Hypercube Sampling — stratified 2-D coverage */
function PLHS({E}) {
  const reveal=useReveal();
  const [tick,setTick]=useState(0);
  useEffect(()=>{ const id=setInterval(()=>setTick(t=>t+1),1400); return ()=>clearInterval(id); },[]);
  const d=useMemo(()=>{
    const n=20;
    const perm=()=>{ const a=[...Array(n).keys()];
      for(let i=n-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
    const px=perm(), py=perm(), pts=[];
    for(let i=0;i<n;i++) pts.push([(px[i]+Math.random())/n,(py[i]+Math.random())/n]);
    return { n, pts };
  },[E,tick]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const S=300,pad=14;
  const map=v=>pad+v*(S-2*pad);
  return <Panel label={`Latin Hypercube Sampling · ${d.n}×${d.n}`}>
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{fontSize:14,color:'var(--sec)',marginBottom:8}}>
        Stratified coverage — exactly one sample per row and column
      </div>

        <svg viewBox={`0 0 ${S} ${S}`} style={{height:'100%',maxHeight:232,width:'auto',display:'block'}}>
          {[...Array(d.n+1)].map((_,i)=>(
            <g key={i}>
              <line x1={map(i/d.n)} y1={pad} x2={map(i/d.n)} y2={S-pad} stroke="var(--faint)" strokeWidth="1"/>
              <line x1={pad} y1={map(i/d.n)} x2={S-pad} y2={map(i/d.n)} stroke="var(--faint)" strokeWidth="1"/>
            </g>
          ))}

          ))}

}

/* FEM / FDM — explicit finite-difference solve of the diffusion equation */
function PFDM({E}) {
  const reveal=useReveal();
  const d=useMemo(()=>{
    const GX=120, x0=logit((E.now>0&&E.now<1)?E.now:E.yes);
    const xlo=-6,xhi=6,dx=(xhi-xlo)/GX;
    let f=new Array(GX).fill(0);
    for(let i=0;i<GX;i++){ const x=xlo+i*dx; f[i]=Math.exp(-(x-x0)*(x-x0)/0.18); }
    const norm=a=>{ const s=a.reduce((q,v)=>q+v,0)*dx||1; return a.map(v=>v/s); };
    f=norm(f);
    const D=0.5, dt=0.4*dx*dx/D, steps=Math.round(1.6/dt);
    const marks=[Math.round(steps*0.18),Math.round(steps*0.45),Math.round(steps*0.78),steps];
    const slices=[f.slice()]; let cur=f;
    for(let s=1;s<=steps;s++){
      const nx=cur.slice();
      for(let i=1;i<GX-1;i++) nx[i]=cur[i]+D*dt/(dx*dx)*(cur[i+1]-2*cur[i]+cur[i-1]);
      cur=nx;
      if(marks.includes(s)) slices.push(norm(cur).slice());
    }
    return { slices, GX };
  },[E]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const W=1000,VH=300,pad=16;
  const xs=i=>pad+(i/(d.GX-1))*(W-2*pad);
  const NS=d.slices.length, peak=Math.max(...d.slices.flat(),1);
  const amp=(VH-2*pad)*0.34;
  return <Panel label="Finite-Difference Scheme · FEM / FDM">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{fontSize:14,color:'var(--sec)',marginBottom:6}}>
        Probability density diffusing from today out to resolution
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',alignItems:'center'}}>
        <svg viewBox={`0 0 ${W} ${VH}`} style={svgS}>
          {d.slices.map((sl,si)=>{
            const baseY=pad+amp+(si/(NS-1))*((VH-2*pad)-amp-12);
            const ln=sl.map((v,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+(baseY-(v/peak)*amp).toFixed(1)).join(' ');
            const ar=ln+` L${xs(d.GX-1).toFixed(1)} ${baseY.toFixed(1)} L${xs(0).toFixed(1)} ${baseY.toFixed(1)} Z`;
            const last=si===NS-1;
            return <g key={si} style={{opacity:reveal?1:0,transition:`opacity .6s ease ${si*130}ms`}}>
              <path d={ar} fill="#fff"/>
              <path d={ar} fill={col} opacity={last?0.18:0.08}/>
              <path d={ln} fill="none" stroke={col} strokeWidth={last?3:1.6} opacity={last?1:0.5}/>
            </g>;
          })}
        </svg>
      </div>
      <div style={capS}>Explicit FDM · {d.GX} nodes solving the diffusion equation</div>
    </div>
  </Panel>;
}

/* Численное интегрирование — Simpson's rule over the outcome density */
function PIntegration({E}) {
  const reveal=useReveal();
  const liveT=useLiveTick(900);
  const mc=useMemo(()=>monteCarlo(E),[E,liveT]);
  const d=useMemo(()=>{
    const finals=mc.paths.map(p=>p[mc.STEPS]);
    const mu=mean(finals), sg=stdev(finals)||0.02;
    const simp=(lo,hi,n,g)=>{ const h=(hi-lo)/n; let s=0;
      for(let i=0;i<=n;i++){ const w=(i===0||i===n)?1:(i%2?4:2); s+=w*g(lo+i*h); }
      return s*h/3; };
    const area=simp(0,1,64,x=>normPDF(x,mu,sg))||1;
    const ev=simp(0,1,64,x=>x*normPDF(x,mu,sg))/area;
    const tail=simp(0.5,1,32,x=>normPDF(x,mu,sg))/area;
    return { mu, sg, ev, tail };
  },[mc]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const W=1000,VH=280,pad=16;
  const xs=x=>pad+x*(W-2*pad);
  const pk=normPDF(d.mu,d.mu,d.sg)||1;
  const ys=y=>VH-pad-(y/pk)*(VH-2*pad)*0.95;
  const cv=[]; for(let i=0;i<=110;i++){ const x=i/110; cv.push((i?'L':'M')+xs(x).toFixed(1)+' '+ys(normPDF(x,d.mu,d.sg)).toFixed(1)); }
  const sh=[]; for(let i=0;i<=60;i++){ const x=0.5+i*0.5/60; sh.push('L'+xs(x).toFixed(1)+' '+ys(normPDF(x,d.mu,d.sg)).toFixed(1)); }
  const shArea=`M${xs(0.5).toFixed(1)} ${VH-pad} `+sh.join(' ')+` L${xs(1).toFixed(1)} ${VH-pad} Z`;
  return <Panel label="Numerical Integration · Simpson's Rule">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:6}}>
        <AnimNum to={d.tail*100} suffix="%" dec={1} size={40} dur={1300} color={col}/>
        <span style={{fontSize:14,color:'var(--sec)'}}>integrated mass above 50% · E[p] = {pct(d.ev,1)}</span>
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',alignItems:'center'}}>
        <svg viewBox={`0 0 ${W} ${VH}`} style={svgS}>
          <path d={shArea} fill={col} style={{opacity:reveal?0.22:0,transition:'opacity 1s ease .2s'}}/>
          <path d={cv.join(' ')} fill="none" stroke={col} strokeWidth="3.2"
            style={{opacity:reveal?1:0,transition:'opacity 1s ease'}}/>
          <line x1={xs(0.5)} y1={pad} x2={xs(0.5)} y2={VH-pad} stroke="var(--dim)"
            strokeWidth="1.4" strokeDasharray="4 4"/>
        </svg>
      </div>
      <div style={capS}>Simpson's rule · 64 panels under the outcome density</div>
    </div>
  </Panel>;
}

/* MCMC — Metropolis-Hastings sampling of the posterior over the true rate */
function PMCMC({E}) {
  const reveal=useReveal();
  const liveT=useLiveTick(1100);
  const d=useMemo(()=>{
    const yh=E.yesHolders.length, nh=E.noHolders.length;
    let A,B;
    if(yh+nh>0){ const sc=16/(yh+nh); A=2+yh*sc; B=2+nh*sc; }
    else { A=2+E.yes*16; B=2+(1-E.yes)*16; }
    const lp=t=>(t<=0||t>=1)?-1e9:(A-1)*Math.log(t)+(B-1)*Math.log(1-t);
    const N=600; let t=0.5, cur=lp(t), acc=0; const chain=[];
    for(let i=0;i<N;i++){
      const prop=t+0.08*randn(), pp=lp(prop);
      if(Math.log(Math.random())<pp-cur){ t=prop; cur=pp; acc++; }
      chain.push(t);
    }
    const burn=chain.slice(100), srt=[...burn].sort((x,y)=>x-y);
    return { chain, N, burn, acc:acc/N,
      mean:mean(burn),
      ci:[srt[Math.round(0.025*srt.length)],srt[Math.round(0.975*srt.length)]] };
  },[E,liveT]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const W=1000,VH=290,pad=16,trW=660;
  const xs=i=>pad+(i/(d.N-1))*(trW-2*pad);
  const ys=v=>pad+(1-v)*(VH-2*pad);
  const trace=d.chain.map((v,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(v).toFixed(1)).join(' ');
  const bins=24, hh=histogram(d.burn,bins,0,1).h, hpk=Math.max(...hh,1), binPx=(VH-2*pad)/bins;
  return <Panel label="Markov Chain Monte Carlo · Metropolis">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',gap:20,marginBottom:6}}>
        <div><div style={lblS}>Posterior mean</div><div style={valS}>{pct(d.mean,1)}</div></div>
        <div><div style={lblS}>95% credible</div><div style={valS}>{pct(d.ci[0],0)}–{pct(d.ci[1],0)}</div></div>
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',alignItems:'center'}}>
        <svg viewBox={`0 0 ${W} ${VH}`} style={svgS}>
          <path d={trace} fill="none" stroke={col} strokeWidth="1.5"
            style={{opacity:reveal?0.85:0,transition:'opacity 1.1s ease'}}/>
          {hh.map((c,i)=>(
            <rect key={i} x={trW} y={pad+(bins-1-i)*binPx+1}
              width={reveal?(c/hpk)*(W-trW-pad):0} height={binPx-2} fill={col} opacity="0.5"
              style={{transition:`width .8s cubic-bezier(.33,1,.68,1) ${i*20}ms`}}/>
          ))}
        </svg>
      </div>
      <div style={capS}>Trace + posterior histogram · acceptance {pct(d.acc,0)}</div>
    </div>
  </Panel>;
}

/* Вариационный байесовский вывод — Beta prior updated to a posterior */
function PVariational({E}) {
  const reveal=useReveal();
  const d=useMemo(()=>{
    const a0=2,b0=2;
    const yh=E.yesHolders.reduce((s,h)=>s+h.shares,0);
    const nh=E.noHolders.reduce((s,h)=>s+h.shares,0);
    let S,F;
    if(yh+nh>0){ const sc=40/(yh+nh); S=yh*sc; F=nh*sc; }
    else { S=E.yes*30; F=(1-E.yes)*30; }
    return { a0, b0, a:a0+S, b:b0+F };
  },[E]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const W=1000,VH=280,pad=16;
  const xs=x=>pad+x*(W-2*pad);
  const build=(a,b)=>{ const pts=[]; let pk=0;
    for(let i=0;i<=120;i++){ const x=i/120, y=betaPDF(x,a,b); pts.push([x,y]); if(y>pk)pk=y; }
    return { pts, pk }; };
  const post=build(d.a,d.b), prior=build(d.a0,d.b0);
  const pk=Math.max(post.pk,prior.pk)||1;
  const ys=y=>VH-pad-(y/pk)*(VH-2*pad)*0.95;
  const toP=o=>o.pts.map((p,i)=>(i?'L':'M')+xs(p[0]).toFixed(1)+' '+ys(p[1]).toFixed(1)).join(' ');
  return <Panel label="Variational Bayesian Inference">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:6}}>
        <AnimNum to={d.a/(d.a+d.b)*100} suffix="%" dec={1} size={40} dur={1300} color={col}/>
        <span style={{fontSize:14,color:'var(--sec)'}}>variational posterior mean</span>
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',alignItems:'center'}}>
        <svg viewBox={`0 0 ${W} ${VH}`} style={svgS}>
          <path d={toP(prior)} fill="none" stroke="var(--dim)" strokeWidth="1.8" strokeDasharray="5 5"
            style={{opacity:reveal?0.8:0,transition:'opacity 1s ease'}}/>
          <path d={toP(post)+` L${xs(1)} ${VH-pad} L${xs(0)} ${VH-pad} Z`} fill={col}
            style={{opacity:reveal?0.15:0,transition:'opacity 1s ease .25s'}}/>
          <path d={toP(post)} fill="none" stroke={col} strokeWidth="3.4"
            style={{opacity:reveal?1:0,transition:'opacity 1s ease .25s'}}/>
        </svg>
      </div>
      <div style={capS}>
        Prior <b>┄</b> updated to posterior <b style={{color:col}}>━</b> · ELBO converged
      </div>
    </div>
  </Panel>;
}

/* Анализ чувствительности — tornado of how each input moves the outcome */
function PSensitivity({E}) {
  const reveal=useReveal();
  const d=useMemo(()=>{
    const mc=monteCarlo(E);
    const x0=logit((E.now>0&&E.now<1)?E.now:E.yes);
    const sig=Math.max(0.05,(logit(mc.hi[mc.STEPS])-logit(mc.lo[mc.STEPS]))/3.29);
    const out=(x,s)=>normCDF(x/s);
    const base=out(x0,sig);
    const rows=[
      {k:'Current price',   lo:out(x0*0.85,sig),               hi:out(x0*1.15,sig)},
      {k:'Volatility σ',    lo:out(x0,sig*1.3),                hi:out(x0,sig*0.7)},
      {k:'Time to resolve', lo:out(x0,sig*Math.sqrt(1.4)),     hi:out(x0,sig*Math.sqrt(0.6))},
      {k:'Drift bias',      lo:out(x0-0.4,sig),                hi:out(x0+0.4,sig)},
    ].map(r=>({ ...r, loD:r.lo-base, hiD:r.hi-base, span:Math.abs(r.hi-r.lo) }));
    rows.sort((a,b)=>b.span-a.span);
    return { base, rows };
  },[E]);
  const col=(E.isMulti||E.yes>=0.5)?'var(--green)':'var(--red)';
  const maxD=Math.max(...d.rows.map(r=>Math.max(Math.abs(r.loD),Math.abs(r.hiD))),0.01);
  return <Panel label="Sensitivity Analysis · Tornado">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>
      <div style={{fontSize:14,color:'var(--sec)',marginBottom:12}}>
        Impact on P(resolves yes) · baseline {pct(d.base,1)}
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',justifyContent:'center',gap:15}}>
        {d.rows.map((r,i)=>{
          const negW=Math.abs(Math.min(r.loD,r.hiD,0))/maxD*50;
          const posW=Math.abs(Math.max(r.loD,r.hiD,0))/maxD*50;
          return <div key={i}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:5}}>{r.k}</div>
            <div style={{position:'relative',height:16}}>
              <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:1,background:'var(--dim)'}}/>
              <div style={{position:'absolute',right:'50%',height:'100%',background:'var(--red)',
                width:reveal?`${negW}%`:'0%',borderRadius:'3px 0 0 3px',transition:`width .9s ease ${i*80}ms`}}/>
              <div style={{position:'absolute',left:'50%',height:'100%',background:col,
                width:reveal?`${posW}%`:'0%',borderRadius:'0 3px 3px 0',transition:`width .9s ease ${i*80}ms`}}/>
            </div>

/* overlay chart — top 5 outcomes' price history as live, breathing lines */
function PRaceChart({E}) {
  const W=540, H=300, pad=30;
  const baseRaces=E.races.slice(0,5);
  const reveal=useReveal();
  const refs=useRef([]);
  /* live extension — each line grows new points every ~320ms */
  const [live,setLive]=useState(()=>baseRaces.map(()=>[]));
  const lastT=useRef(baseRaces.map(r=>{
    const h=r.hist;
    return h.length ? h[h.length-1].t : Date.now()/1000;
  }));
  const lastP=useRef(baseRaces.map(r=>r.yes));
  useEffect(()=>{
    const id=setInterval(()=>{
      setLive(L=>baseRaces.map((r,i)=>{
        lastT.current[i]+=900;
        const cur=lastP.current[i];
        const drift=(Math.random()-0.5)*0.022;
        const next=Math.max(0.01,Math.min(0.99, cur+drift));
        lastP.current[i]=next;
        return [...(L[i]||[]),{t:lastT.current[i],p:next}].slice(-48);
      }));
    },320);
    return ()=>clearInterval(id);
  },[baseRaces]);
  const races=baseRaces.map((r,i)=>({...r, hist:[...r.hist, ...(live[i]||[])]}));
  /* shared bounds */
  const all=races.flatMap(r=>r.hist.map(p=>p.p)); if(!all.length) all.push(E.yes);
  let lo=Math.min(...all), hi=Math.max(...all); const rng=(hi-lo)||0.1;
  lo=Math.max(0,lo-rng*0.15); hi=Math.min(1,hi+rng*0.15);
  const allT=races.flatMap(r=>r.hist.map(p=>p.t));
  const t0=Math.min(...allT,Date.now()/1000), t1=Math.max(...allT,Date.now()/1000);
  const xs=t=>pad+((t-t0)/(t1-t0||1))*(W-2*pad);
  const ys=p=>pad+(1-(p-lo)/(hi-lo))*(H-2*pad);
  const paths=races.map(r=>{
    if(r.hist.length<2) return {empty:true,r};
    const src=r.hist;
    const step=Math.max(1,Math.floor(src.length/100));
    const pts=[]; for(let i=0;i<src.length;i+=step) pts.push(src[i]); pts.push(src[src.length-1]);
    return { r, d:pts.map((p,i)=>(i?'L':'M')+xs(p.t).toFixed(1)+' '+ys(p.p).toFixed(1)).join(' '),
             end:{x:xs(pts[pts.length-1].t),y:ys(pts[pts.length-1].p),p:pts[pts.length-1].p} };
  });
  /* initial draw-on for each line, then transition keeps it smooth */
  const drawn=useRef(false);
  useEffect(()=>{
    if(drawn.current) return;
    paths.forEach((pp,i)=>{
      const p=refs.current[i]; if(!p||pp.empty) return;
      try{ const len=p.getTotalLength();
        p.style.transition='none'; p.style.strokeDasharray=len; p.style.strokeDashoffset=len;
        p.getBoundingClientRect();
        requestAnimationFrame(()=>{
          p.style.transition=`stroke-dashoffset 1.4s cubic-bezier(.33,1,.68,1) ${i*100}ms`;
          p.style.strokeDashoffset=0;
        });
        setTimeout(()=>{ if(p) p.style.strokeDasharray='none'; },1500+i*100);
      }catch(_){}
    });
    drawn.current=true;
  },[reveal]);
  return <Panel label="Race Trend · LIVE" accent="var(--text)">
    <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',position:'relative'}}>
      {/* subtle horizontal scanner */}
      <div style={{position:'absolute',top:0,bottom:0,left:0,width:'18%',
        background:'linear-gradient(90deg,transparent,rgba(12,12,12,0.05),transparent)',
        animation:'sweepX 3.4s linear infinite',pointerEvents:'none',zIndex:1}}/>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',flex:1,minHeight:0,display:'block',overflow:'visible',position:'relative',zIndex:2}}>
        {[0.25,0.5,0.75].map((f,i)=>(
          <g key={i}>
            <line x1={pad} y1={pad+(1-f)*(H-2*pad)} x2={W-pad} y2={pad+(1-f)*(H-2*pad)} stroke="var(--faint)" strokeWidth="1"/>
            <text x={W-pad} y={pad+(1-f)*(H-2*pad)-4} textAnchor="end" fontSize="11" fill="var(--dim)" fontFamily="var(--font)">{Math.round((lo+(hi-lo)*f)*100)}%</text>
          </g>
        ))}
        {paths.map((pp,i)=> pp.empty ? null : <g key={i}>
          <path ref={el=>refs.current[i]=el} d={pp.d} fill="none" stroke={pp.r.color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"
            style={{transition:'d .35s linear'}}/>
          <circle cx={pp.end.x} cy={pp.end.y} r="6" fill={pp.r.color} opacity="0.3"
            style={{transformBox:'fill-box',transformOrigin:'center',animation:`pulseDot 1.8s ease-out infinite ${i*220}ms`}}/>
          <circle cx={pp.end.x} cy={pp.end.y} r="3.5" fill={pp.r.color} style={{transition:'cx .35s linear, cy .35s linear'}}/>
        </g>)}
      </svg>
      <div style={{display:'flex',flexWrap:'wrap',gap:'4px 12px',marginTop:8,paddingLeft:6}}>
        {races.map((r,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600,color:'var(--sec)',
            maxWidth:'48%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            <span style={{width:9,height:9,borderRadius:5,background:r.color,flexShrink:0,
              animation: i===0 ? 'pulseLive 1.6s ease-in-out infinite' : 'none'}}/>
            <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</span>
            <span style={{color:r.color,fontWeight:700,fontVariantNumeric:'tabular-nums'}}>{pct(r.yes,0)}</span>
          </div>
        ))}
      </div>
    </div>
  </Panel>;
}

/* race-aware Monte Carlo — simulates each contender's logit walk to resolution
   and reports the probability each one ends up the eventual "winner" */
function raceMonteCarlo(races, endTs){
  const N=240;
  const hrsLeft=Math.max(24,(endTs-Date.now())/3600000);
  const STEPS=Math.min(60,Math.max(12,Math.floor(hrsLeft/8)));
  const cs=races.map(r=>{
    const h=r.hist||[];
    const ret=[]; for(let i=1;i<h.length;i++){
      const a=Math.min(0.999,Math.max(0.001,h[i-1].p)), b=Math.min(0.999,Math.max(0.001,h[i].p));
      ret.push(Math.log(b/(1-b))-Math.log(a/(1-a)));
    }
    const sd=stdev(ret)||0.18;
    return { r, sd: Math.min(0.45,Math.max(0.06,sd)), p0:Math.min(0.999,Math.max(0.001,r.yes)) };
  });
  const wins=new Array(cs.length).fill(0);
  for(let n=0;n<N;n++){
    const finals=cs.map(c=>{
      let x=Math.log(c.p0/(1-c.p0));
      for(let s=0;s<STEPS;s++) x+=randn()*c.sd;
      return 1/(1+Math.exp(-x));
    });
    let bi=0; for(let i=1;i<finals.length;i++) if(finals[i]>finals[bi]) bi=i;
    wins[bi]++;
  }
  return cs.map((c,i)=>({ name:c.r.name, color:c.r.color, yes:c.r.yes, winP: wins[i]/N }));
}

/* ── QR ───────────────────────────────────────────────────────────────── */
function QR({text, size=260, dark='#0c0c0c', light='#ffffff'}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current || !window.qrcode) return;
    try{
      const qr=window.qrcode(0,'M');
      qr.addData(text);
      qr.make();
      const cells=qr.getModuleCount();
      const cell=Math.floor(size/(cells+2)); // +2 for quiet zone
      const px=cell*(cells+2);
      let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${px}" height="${px}" shape-rendering="crispEdges" viewBox="0 0 ${px} ${px}"><rect width="100%" height="100%" fill="${light}"/>`;
      for(let r=0;r<cells;r++){
        for(let c=0;c<cells;c++){
          if(qr.isDark(r,c)){
            svg+=`<rect x="${(c+1)*cell}" y="${(r+1)*cell}" width="${cell}" height="${cell}" fill="${dark}"/>`;
          }
        }
      }
      svg+='</svg>';
      ref.current.innerHTML=svg;
    }catch(e){ ref.current.textContent='QR error'; }
  },[text,size,dark,light]);
  return <div ref={ref} style={{width:size,height:size,background:light,padding:0,borderRadius:'var(--r-md)',
    boxShadow:'0 1px 0 rgba(0,0,0,0.04), 0 14px 32px -16px rgba(0,0,0,0.25)',overflow:'hidden',
    display:'flex',alignItems:'center',justifyContent:'center'}}/>;
}

/* ── HOOK ─────────────────────────────────────────────────────────────── */
/* Picks the most baity angle from the event data — counter-narrative
   framing so the viewer waits for the answer. */
function pickEventHook(E){
  const hrsLeft = E.endTs ? (E.endTs - Date.now())/3600000 : Infinity;
  const yesP    = Math.round((E.yes||0)*100);
  const drift7d = E.history && E.history.length>1
    ? ((E.history[E.history.length-1].p||0) - (E.history[0].p||0))*100
    : 0;
  const bigTrade = (E.trades||[]).filter(t=>t&&t.usd>=1e5).sort((a,b)=>b.usd-a.usd)[0];

  /* ── multi-outcome hooks (race events like "what will happen before X") ── */
  if(E.isMulti){
    const f=E.fieldFull||[];
    const leader=f[0], second=f[1];
    const settled = f.filter(x=>x.yes>=0.985).length;
    /* multiple outcomes already settled — the race is partly done */
    if(settled>=2){
      return {kicker:`${settled} ALREADY HAPPENED`,
        big: settled+'/'+f.length, bigColor:'var(--green)',
        headline:'The race is half over.',
        sub:'And the market saw it coming.'};
    }
    /* big mover among outcomes — highest priority story */
    const mover = [...f].filter(x=>x.yes<0.985).sort((a,b)=>Math.abs(b.chg24h)-Math.abs(a.chg24h))[0];
    if(mover && Math.abs(mover.chg24h)>=0.04){
      return {kicker:'24H MOVER',
        big:(mover.chg24h>0?'+':'')+(Math.abs(mover.chg24h*100)).toFixed(1)+'pp',
        bigColor: mover.chg24h>0?'var(--green)':'var(--red)',
        headline:`"${mover.name}" just moved that much.`,
        sub:'Something the market knows.'};
    }
    /* tightening race — only if both unresolved */
    if(leader && second && leader.yes<0.985 && second.yes<0.985 && (leader.yes-second.yes)<0.06){
      const gap=Math.max(0.1,(leader.yes-second.yes)*100);
      return {kicker:'NECK AND NECK',
        big: gap.toFixed(1)+'pp', bigColor:'var(--red)',
        headline:'The lead is up for grabs.',
        sub:`${f.filter(x=>x.yes<0.985).length} contenders still in play.`};
    }
    /* dominant leader (unresolved) */
    if(leader && leader.yes<0.985 && leader.yes>=0.45){
      return {kicker:`LEADING · ${E.marketCount} OUTCOMES`,
        big: Math.round(leader.yes*100)+'%', bigColor:'var(--green)',
        headline:`"${leader.name}" is the favourite.`,
        sub:`${E.marketCount-1} contenders chasing.`};
    }
    /* default multi */
    return {kicker:'POLYMARKET RACE',
      big: E.marketCount+'', bigColor:'var(--text)',
      headline:`${E.marketCount} outcomes. One winner.`,
      sub:'Watch how the market ranks them.'};
  }

  if(E.resolved) return {
    kicker:'POLYMARKET · RESOLVED',
    big: yesP+'%', bigColor:'var(--text)',
    headline:'The market has spoken.',
    sub:"Here's what it saw coming."};

  if(bigTrade && bigTrade.usd>=1e5) return {
    kicker:'WHALE ALERT',
    big:'$'+fmt(bigTrade.usd), bigColor: bigTrade.side==='BUY'?'var(--green)':'var(--red)',
    headline:'One trader just bet that big.',
    sub:"On the side most retail isn't."};

  if(hrsLeft>0 && hrsLeft<24) return {
    kicker:'CLOSING SOON',
    big: Math.max(1,Math.floor(hrsLeft))+'h', bigColor:'var(--red)',
    headline:'The market may still be pricing this wrong.',
    sub:'Decide before the clock does.'};

  if(Math.abs(drift7d)>=10) return {
    kicker:'PRICE MOVED · 7D',
    big: (drift7d>0?'+':'')+Math.round(drift7d)+'%', bigColor: drift7d>0?'var(--green)':'var(--red)',
    headline:'Something just shifted.',
    sub:'Smart money knows. Do you?'};

  if(E.volume>1e6) return {
    kicker:'TOTAL VOLUME',
    big:'$'+fmt(E.volume), bigColor:'var(--text)',
    headline:'is riding on this answer.',
    sub:"Here's what the odds say."};

  return {
    kicker:'POLYMARKET · LIVE',
    big: yesP+'%', bigColor: yesP>=50?'var(--green)':'var(--red)',
    headline:'is what the market believes.',
    sub:'Watch why it might be wrong.'};
}

function HookSlide({E}){
  const h=useMemo(()=>pickEventHook(E),[E]);
  const ai=(typeof window!=='undefined')&&window.__aiCopy&&window.__aiCopy.hook;
  if(ai){ if(ai.kicker)h.kicker=ai.kicker; if(ai.headline)h.headline=ai.headline; if(ai.sub)h.sub=ai.sub; }
  const bigStr=String(h.big==null?'':h.big);
  const bigSize=bigStr.length>=9?130:bigStr.length>=7?166:bigStr.length>=6?186:220;

  </div>;
}

  return <div style={SC}><div style={{textAlign:'center',maxWidth:880,width:'100%'}}>

    <div style={{fontSize:26,fontWeight:700,letterSpacing:'-0.025em',color:'var(--text)',lineHeight:1.15,marginBottom:14,maxWidth:680,marginLeft:'auto',marginRight:'auto'}}>{E.title}</div>
    <div style={{marginBottom:22}}>
      <span style={{fontSize:13,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',color:'#fff',background:s.color,padding:'7px 14px',borderRadius:8}}>{s.label}</span>
    </div>
    <div style={{display:'grid',gridTemplateColumns:multi?'1fr 1fr 1fr':'1fr 1fr',gap:multi?10:14,marginBottom:24}}>
      {cells.map(c=>(
        <div key={c.label} style={{background:c.tint,border:`1.5px solid ${c.bd}`,borderRadius:multi?16:20,padding:multi?'14px 12px':'20px 18px',minWidth:0}}>
          <div style={{fontSize:multi?10:11,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--dim)',marginBottom:6,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.label}{multi?'':' pays'}</div>
          <AnimNum to={c.mult} suffix="×" dec={c.mult>=10?1:2} size={multi?48:64} dur={1600} color={c.color}/>
          <div style={{fontSize:multi?11:13,color:'var(--sec)',marginTop:6,fontWeight:600}}>{multi?'pays':'$100 becomes'} ${fmt(100*c.mult)}</div>
        </div>
      ))}
    </div>
    {/* QR + CTA */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:28,
      background:'#fff',border:'1.5px solid var(--faint)',borderRadius:'var(--r-lg)',padding:'22px 26px',
      boxShadow:'0 18px 38px -22px rgba(0,0,0,0.18)'}}>
      <QR text={url} size={210}/>
      <div style={{textAlign:'left',maxWidth:320}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.22em',textTransform:'uppercase',color:'var(--dim)',marginBottom:8}}>Scan to trade →</div>
        <div style={{fontSize:24,fontWeight:700,letterSpacing:'-0.02em',color:'var(--text)',lineHeight:1.15,marginBottom:8}}>{vLine1}</div>
        <div style={{fontSize:13,color:'var(--sec)',fontWeight:500,lineHeight:1.45,marginBottom:10}}>{vLine2}</div>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.04em',color:'var(--dim)',fontFamily:'ui-monospace,SFMono-Regular,Menlo,monospace',wordBreak:'break-all'}}>{url.replace('https://','')}</div>
      </div>

/* persistent live countdown — stays on screen across every group */
function CountdownHUD({ endTs, resolved }) {
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{ const id=setInterval(()=>setNow(Date.now()),1000); return ()=>clearInterval(id); },[]);
  const diff=(endTs||0)-now;
  const live=!resolved && diff>0;
  let txt='MARKET RESOLVED';
  if(live){
    const d=Math.floor(diff/86400000),
          h=Math.floor(diff/3600000)%24,
          m=Math.floor(diff/60000)%60,
          sec=Math.floor(diff/1000)%60,
          pad=n=>String(n).padStart(2,'0');
    txt=`RESOLVES IN ${d}d ${pad(h)}:${pad(m)}:${pad(sec)}`;
  }
  return <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:120,display:'flex',alignItems:'center',gap:9,
    background:'var(--text)',color:'#fff',padding:'8px 16px',borderRadius:'var(--r-lg)',fontSize:12,fontWeight:600,letterSpacing:'0.05em'}}>
    <span style={{width:7,height:7,borderRadius:4,background:live?'var(--green)':'var(--dim)',
      animation:live?'pulseLive 1.6s ease-in-out infinite':'none'}}/>
    <span style={{fontVariantNumeric:'tabular-nums'}}>{txt}</span>
  </div>;
}

/* ── GRID PRESENTATION ────────────────────────────────────────────────── */
const GROUP_TITLES=['Market Snapshot','Trend & Simulation','Distribution Fitting',
  'Sampling Methods','Numerical Solvers','Bayesian Inference','Sensitivity & Drift',
  'Market Pulse','The Field','Smart Money','The Verdict','Deeper Read'];

/* spreads N panels across ceil(N/4) groups as evenly as possible */
function balancedGroups(arr){
  const n=arr.length, ng=Math.max(1,Math.ceil(n/2));
  const base=Math.floor(n/ng), extra=n%ng;
  const out=[]; let i=0;
  for(let g=0;g<ng;g++){ const size=base+(g<extra?1:0); out.push(arr.slice(i,i+size)); i+=size; }
  return out;
}

function GroupScreen({E,group}) {
  return <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',padding:'54px 28px 66px'}}>
    <div style={{textAlign:'center',marginBottom:16,flexShrink:0}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'var(--dim)',
        marginBottom:7,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{E.title}</div>
      <div style={{fontSize:25,fontWeight:700,letterSpacing:'-0.02em',color:'var(--text)'}}>{group.title}</div>
    </div>
    <div style={{flex:1,minHeight:0,display:'grid',gridTemplateColumns:'1fr',
      gridTemplateRows: group.panels.length>1 ? '1fr 1fr' : '1fr', gap:14}}>
      {group.panels.map((k,i)=>React.cloneElement(renderPanel(k,E),{key:k+i,idx:i}))}
    </div>
  </div>;
}

/* panels toggled off in the UI arrive as ?hide=id,id */
const HIDDEN = new Set((new URLSearchParams(window.location.search).get('hide')||'').split(',').map(s=>s.trim()).filter(Boolean));

function GridPresentation({ E, onBack }) {
  /* Explicit, semantic grouping — keeps related panels on the same slide
     (Backing + Fading together) and gives list/verdict panels their own full
     slide. Each group carries its own title, so titles always match content
     and nothing shifts when a panel is absent or toggled off. */
  const groups = useMemo(()=>{
    const has = p => p && !HIDDEN.has(p);
    const G = [];
    const add = (title, ...panels) => {
      const ps = panels.filter(has);
      if (ps.length) G.push({ title, panels: ps });
    };
    if (E.isMulti && E.races && E.races.length>=2) add('The Race','racechart','racemc');
    // keep prob + gauge apart (they show the same number); pair each with a chart
    add('Market Snapshot','prob', E.history.length>1?'chart':null);
    add('Odds & Momentum','gauge','momentum');
    if (!E.resolved) {
      add('Monte Carlo','montecarlo','gauss');
      add('Sampling Methods','moments','quasimc');
      add('Numerical Solvers','lhs','fdm');
      add('Bayesian Inference','integration','mcmc');
      add('Sensitivity & Drift','variational','sensitivity');
    }
    add('Market Pulse','heating','pulse');
    if (E.isMulti) add('The Field','field');                         // solo leaderboard
    add('Who Is Backing It', E.yesHolders.length?'hy':null,
                             E.noHolders.length?'hn':null);          // backing + fading together
    if (E.trades.length) add('Smart Money Flow','activity');         // solo, full page
    add('The Verdict','verdict');                                    // solo, full page
    return G;
  },[E]);

  const deck = useMemo(()=>[
    { id:'hook', dur:1900 },
    ...groups.map((g,i)=>({ id:'g'+i, panels:g.panels, title:g.title, dur:3467 })),
    { id:'endcard', dur:600000 },
  ],[groups]);

  const [idx,setIdx]=useState(0);
  const [vis,setVis]=useState(true);
  const timerRef=useRef(); const busy=useRef(false);

  const advance=useCallback((delta=1)=>{
    if(busy.current || delta % deck.length === 0) return;
    busy.current=true;
    clearTimeout(timerRef.current);
    setVis(false);
    setTimeout(()=>{
      setIdx(i=>(i+delta+deck.length)%deck.length);
      setVis(true); busy.current=false;
    },360);
  },[deck.length]);

  useEffect(()=>{
    timerRef.current=setTimeout(()=>advance(1),deck[idx].dur);
    return ()=>clearTimeout(timerRef.current);
  },[idx,deck,advance]);

  useEffect(()=>{
    const k=e=>{ if(e.key==='ArrowRight')advance(1); else if(e.key==='ArrowLeft')advance(-1); };
    window.addEventListener('keydown',k);
    return ()=>window.removeEventListener('keydown',k);
  },[advance]);

  /* recording hook — record.js waits on ready / finished */
  useEffect(()=>{
    window.__rec={ ready:true, idx, total:deck.length,
      id:deck[idx].id, finished:deck[idx].id==='endcard' };
  },[idx,deck]);

  const cur=deck[idx];

  return (
    <div style={{width:'100%',height:'100%',background:'var(--bg)',overflow:'hidden'}} onClick={()=>advance(1)}>
      {cur.id!=='hook' && <CountdownHUD endTs={E.endTs} resolved={E.resolved}/>}
      {cur.id!=='hook' && <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',display:'flex',gap:8,zIndex:100}}>
        {deck.map((_,i)=>(
          <div key={i} onClick={e=>{e.stopPropagation();advance(i-idx);}}
            style={{height:6,width:i===idx?22:6,borderRadius:3,background:i===idx?'var(--accent)':'var(--faint)',transition:'all .3s ease',cursor:'pointer'}}/>
        ))}
      </div>}
      <div style={{width:'100%',height:'100%',opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(10px)',
        transition:vis?'opacity .42s ease,transform .42s ease':'opacity .32s ease,transform .32s ease'}}>
        {cur.id==='hook'
          ? <HookSlide E={E}/>
          : cur.id==='endcard'
          ? <GridEndcard E={E}/>
          : <GroupScreen key={idx} E={E} group={cur}/>}
      </div>
    </div>
  );
}

/* ── INPUT / LOADING ──────────────────────────────────────────────────── */
function InputScreen({ onLoad, error }) {
  const [val,setVal]=useState('');
  const submit=e=>{ e.preventDefault(); onLoad(val); };
  return (
    <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:32,background:'var(--bg)'}}>
      <div style={{width:'100%',maxWidth:460}}>
        <div style={{marginBottom:44}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--dim)',marginBottom:16}}>Polymarket · Grid</div>
          <h1 style={{fontSize:38,fontWeight:700,color:'var(--text)',letterSpacing:'-0.03em',lineHeight:1.1,marginBottom:10}}>Event Dashboard</h1>
          <p style={{fontSize:15,color:'var(--sec)',lineHeight:1.5}}>Paste a Polymarket event link — four panels per screen</p>
        </div>
        <form onSubmit={submit}>
          <input value={val} onChange={e=>setVal(e.target.value)} autoFocus
            placeholder="polymarket.com/event/…"
            style={{display:'block',width:'100%',background:'white',border:'1.5px solid var(--faint)',borderRadius:11,padding:'14px 16px',color:'var(--text)',fontSize:14,outline:'none',marginBottom:10}}
            onFocus={e=>e.target.style.borderColor='var(--text)'}
            onBlur={e=>e.target.style.borderColor='var(--faint)'}/>
          {error && <div style={{fontSize:12,color:'var(--red)',marginBottom:10}}>{error}</div>}
          <button type="submit" style={{display:'block',width:'100%',background:'var(--text)',color:'white',border:'none',borderRadius:11,padding:'14px 16px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
            Generate Report →
          </button>
        </form>
        <button onClick={()=>onLoad('https://polymarket.com/event/microstrategy-sell-any-bitcoin-in-2025')}
          style={{marginTop:14,background:'none',border:'none',color:'var(--dim)',fontSize:12,cursor:'pointer',textDecoration:'underline',padding:0}}>
          Try example event
        </button>
      </div>
    </div>
  );
}
function LoadingScreen() {
  return (
    <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:40,height:40,border:'2px solid var(--faint)',borderTopColor:'var(--text)',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 16px'}}/>
        <div style={{fontSize:14,color:'var(--dim)'}}>Analyzing event…</div>
      </div>
    </div>
  );
}

/* ── APP ──────────────────────────────────────────────────────────────── */
/* locks the whole dashboard to a fixed 1080×1080 square, scaled to fit
   whatever window it's viewed in — the recorder's 1080 viewport → scale 1 */
function Stage({ children }) {
  const [scale,setScale]=useState(1);
  useEffect(()=>{
    const fit=()=>setScale(Math.min(window.innerWidth/1080,window.innerHeight/1080)||1);
    fit(); window.addEventListener('resize',fit);
    return ()=>window.removeEventListener('resize',fit);
  },[]);
  return <div style={{position:'fixed',inset:0,background:'#0c0c0c',display:'flex',
    alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
    <div style={{width:1080,height:1080,flexShrink:0,position:'relative',overflow:'hidden',
      background:'var(--bg)',backgroundImage:'var(--scene)',backgroundSize:'22px 22px',transform:`scale(${scale})`,transformOrigin:'center center'}}>
      {children}
    </div>
  </div>;
}

function App() {
  const autoEvent=useMemo(()=>new URLSearchParams(window.location.search).get('event'),[]);
  const [screen,setScreen]=useState(autoEvent?'loading':'input');
  const [E,setE]=useState(null);
  const [error,setError]=useState(null);

  const load=useCallback(async (input)=>{
    const slug=parseSlug(input);
    if(!slug){ const m='Invalid link — paste a polymarket.com/event/… URL'; window.__recError=m; setError(m); return; }
    setError(null); setScreen('loading');
    try {
      const data=await loadEvent(slug);
      setE(computeEvent(data));
      setScreen('presentation');
    } catch(e) {
      const m=e.message.includes('fetch') ? 'Network error — check your connection' : e.message;
      window.__recError=m;
      setScreen('input');
      setError(m);
    }
  },[]);

  useEffect(()=>{ if(autoEvent) load(autoEvent); },[autoEvent,load]);

  const inner = screen==='loading' ? <LoadingScreen/>
    : screen==='presentation' ? <GridPresentation E={E} onBack={()=>setScreen('input')}/>
    : <InputScreen onLoad={load} error={error}/>;
  return <Stage>{inner}</Stage>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
